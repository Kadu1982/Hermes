# Evolution API — opcional (mesmo número NÃO usar com Hermes WhatsApp bridge ao mesmo tempo)
# Uso: docker compose -f docker-compose.evolution.yml --env-file .env.evolution up -d

name: jarvis-evolution

services:
  evolution-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EVOLUTION_DB_USER:-evolution}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:?set EVOLUTION_DB_PASSWORD}
      POSTGRES_DB: ${EVOLUTION_DB_NAME:-evolution}
    volumes:
      - evolution_pg:/var/lib/postgresql/data
    networks: [evo_net]

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [evo_net]

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    restart: unless-stopped
    depends_on:
      - evolution-postgres
      - evolution-redis
    ports:
      - "${EVOLUTION_HOST_PORT:-8085}:8080"
    env_file: .env.evolution
    environment:
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${EVOLUTION_DB_USER:-evolution}:${EVOLUTION_DB_PASSWORD}@evolution-postgres:5432/${EVOLUTION_DB_NAME:-evolution}
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:?set EVOLUTION_API_KEY}
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://72.60.55.213:8085}
    volumes:
      - evolution_instances:/evolution/instances
    networks: [evo_net]

networks:
  evo_net:
    name: jarvis_evolution_net

volumes:
  evolution_pg:
  evolution_instances:
